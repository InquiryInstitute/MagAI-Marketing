# Program hub — public site root (each course is a separate book under courses/<code>/myst.yml)
version: 1
project:
  title: Mag.AI-Marketing
  description: Magisterium credential for post-AI marketing leadership—Castalia’s marketing track when AI is ambient; judgment, measurement, governed tools, and artifact-grade work you can defend.
  keywords:
    - marketing
    - artificial intelligence
    - Castalia
    - Magisterium
    - post-AI marketing
  exclude:
    - README.md
    - pages/README.md
    - scripts/**
    - courses/**
    - slides/**
    - exercises/**
  toc:
    - file: index.md
    - file: catalog.md
    - title: Orientation
      children:
        - file: pages/program-overview.md
        - file: pages/curriculum-at-a-glance.md
        - file: pages/certificate.md
    - title: Program reference
      children:
        - file: docs/DESIGN.md
        - file: docs/CURRICULUM_OVERVIEW_PROSE.md
        - file: docs/CURRICULUM_FULL.md
        - file: docs/MCP_MARKETING.md
        - file: docs/ASSESSMENT.md
site:
  template: book-theme
  options:
    logo_text: Castalia Institute - Magisterium
    style: styles/site.css
    # Hide the in-page “Contents” block; section links stay in the left nav drawer
    # (Open Menu → Table of Contents). Same for every course book (see courses/*/myst.yml).
    hide_outline: true
  actions:
    - title: Castalia — Magisterium
      url: https://magisterium.castalia.institute/magai/
